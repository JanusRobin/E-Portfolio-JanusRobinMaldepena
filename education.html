<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education | My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
}

header {
    text-align: center;
    padding: 30px;
}

header h1 {
    color: #38bdf8;
}

nav a {
    color: #94a3b8;
    margin: 0 15px;
    text-decoration: none;
    position: relative;
    font-weight: bold;
}

nav a::after {
    content: "";
    width: 0;
    height: 2px;
    background: #38bdf8;
    position: absolute;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

nav a:hover {
    color: #38bdf8;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

h2 {
    color: #38bdf8;
    margin-bottom: 30px;
    text-align: center;
}

.timeline {
    position: relative;
    padding-left: 40px;
    border-left: 3px solid #38bdf8;
}

.timeline-item {
    position: relative;
    margin-bottom: 40px;
}


.timeline-item::before {
    content: "";
    position: absolute;
    left: -11px;
    top: 5px;
    width: 18px;
    height: 18px;
    background: #38bdf8;
    border-radius: 50%;
    box-shadow: 0 0 15px #38bdf8;
}

.timeline-content {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(56,189,248,0.1);
}

.timeline-content:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(56,189,248,0.3);
}

.timeline-content h3 {
    color: #38bdf8;
    margin-bottom: 5px;
}

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
    margin-top: 30px;
}

@media(max-width: 600px) {
    .timeline {
        padding-left: 20px;
    }
}
</style>
</head>
