<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | My Portfolio</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Times New Roman", Times, serif;
            background: linear-gradient(to right, #f0f6ff, #e6f0ff);
            color: #1e293b;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0a2540, #123a63);
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: #cfe6ff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffffff;
            letter-spacing: 1px;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .container h2 {
            color: #0a2540;
            margin-bottom: 20px;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
        }

        /* Card */
        .card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }

        /* Contact info */
        .contact-info p {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .contact-info strong {
            color: #0a2540;
        }

        /* Links */
        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
            color: #1d4ed8;
        }

        /* Footer */
        footer {
            background-color: #0a2540;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                text-align: center;
            }
        }
    </style>
</head>

    </nav>
