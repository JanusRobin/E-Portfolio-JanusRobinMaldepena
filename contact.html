<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
}

header {
    text-align: center;
    padding: 30px;
}

header h1 {
    color: #38bdf8;
}

nav a {
    color: #94a3b8;
    margin: 0 15px;
    text-decoration: none;
    position: relative;
    font-weight: bold;
}

nav a::after {
    content: "";
    width: 0;
    height: 2px;
    background: #38bdf8;
    position: absolute;
    bottom: -5px;
    left: 0;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

nav a:hover {
    color: #38bdf8;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(56,189,248,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 35px rgba(56,189,248,0.3);
}

.contact-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

.contact-info p {
    margin-bottom: 20px;
    font-size: 16px;
}

.contact-info strong {
    color: #38bdf8;
}

a {
    color: #38bdf8;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

form {
    display: flex;
    flex-direction: column;
}

input, textarea {
    margin-bottom: 15px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: #fff;
    outline: none;
}

input:focus, textarea:focus {
    box-shadow: 0 0 10px #38bdf8;
}

button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    color: #020617;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.05);
}

footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
}

@media(max-width: 768px) {
    .contact-wrapper {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>Contact Me</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="hobbies.html">Hobbies</a>
        <a href="education.html">Education</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<main class="container">

<div class="card contact-wrapper">

    <!-- Contact Info -->
    <div class="contact-info">
        <p><strong>📱 Phone:</strong> +63 994 622 6067</p>

        <p><strong>📧 Email:</strong><br>
            <a href="mailto:maldepenajanus@gmail.com">
                maldepenajanus@gmail.com
            </a>
        </p>

        <p><strong>🌐 Facebook:</strong><br>
            <a href="https://www.facebook.com/share/1BQH5SS6oo/?mibextid=wwXIfr" target="_blank">
                Janus Maldepena
            </a>
        </p>
    </div>

    <!-- Contact Form -->
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="5" placeholder="Your Message"></textarea>
        <button type="submit">Send Message</button>
    </form>

</div>

</main>

<footer>
    © 2026 My Portfolio
</footer>

</body>
</html>
